<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Code Obfuscator Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Tối ưu hóa thanh cuộn cho khu vực nhập code */
        textarea::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        textarea::-webkit-scrollbar-track {
            background: #1e1e2e;
        }
        textarea::-webkit-scrollbar-thumb {
            background: #313244;
            border-radius: 4px;
        }
        textarea::-webkit-scrollbar-thumb:hover {
            background: #45475a;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans antialiased selection:bg-indigo-500 selection:text-white">

    <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2.5 rounded-xl shadow-lg shadow-indigo-500/20">
                    <i class="fa-solid fa-user-secret text-xl text-white animate-pulse"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">AI Code Obfuscator</h1>
                    <p class="text-xs text-slate-400">Bảo mật mã nguồn của bạn trong tích tắc</p>
                </div>
            </div>
            <div class="flex items-center gap-2 text-xs bg-slate-800/80 px-3 py-1.5 rounded-full text-slate-300 border border-slate-700/50">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-ping"></span>
                AI Core Engine v2.0 Sẵn sàng
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 mb-8 shadow-xl">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-center">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Tải file code lên (.js, .css, .html, .txt)</label>
                    <div class="relative group">
                        <input type="file" id="fileInput" accept=".js,.css,.html,.txt" class="hidden">
                        <button onclick="document.getElementById('fileInput').click()" class="w-full flex items-center justify-center gap-3 px-5 py-4 border-2 border-dashed border-slate-700 hover:border-indigo-500 bg-slate-950 rounded-xl cursor-pointer transition-all duration-200 group-hover:bg-slate-900/50">
                            <i class="fa-solid fa-cloud-arrow-up text-xl text-slate-400 group-hover:text-indigo-400"></i>
                            <span class="text-sm font-medium text-slate-300 group-hover:text-indigo-300" id="fileName">Chọn file từ máy tính của bạn</span>
                        </button>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Chế độ mã hóa AI</label>
                    <div class="grid grid-cols-3 gap-2 bg-slate-950 p-1.5 rounded-xl border border-slate-800">
                        <button class="level-btn py-2 text-xs font-semibold rounded-lg bg-indigo-600 text-white transition-all shadow" data-level="low">Cơ bản</button>
                        <button class="level-btn py-2 text-xs font-semibold rounded-lg text-slate-400 hover:text-white transition-all" data-level="medium">Nâng cao</button>
                        <button class="level-btn py-2 text-xs font-semibold rounded-lg text-slate-400 hover:text-white transition-all" data-level="high">Siêu cấp AI</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <div class="flex flex-col h-[550px] bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden shadow-lg">
                <div class="bg-slate-950/80 px-4 py-3 border-b border-slate-800 flex justify-between items-center">
                    <span class="text-xs font-bold uppercase tracking-wider text-indigo-400"><i class="fa-solid fa-code mr-1.5"></i> Code nguồn gốc</span>
                    <button onclick="clearInput()" class="text-xs text-slate-400 hover:text-rose-400 transition-colors"><i class="fa-solid fa-trash-can mr-1"></i> Xóa sạch</button>
                </div>
                <textarea id="inputCode" placeholder="Dán code của bạn vào đây hoặc tải file lên..." class="w-full flex-1 p-5 bg-slate-900 text-emerald-400 font-mono text-sm border-0 focus:ring-0 resize-none outline-none" spellcheck="false"></textarea>
                <div class="p-4 bg-slate-950/50 border-t border-slate-800/60 flex justify-end">
                    <button onclick="processObfuscate()" class="w-full sm:w-auto px-6 py-2.5 bg-gradient-to-r from-indigo-600 to-indigo-500 hover:from-indigo-500 hover:to-indigo-400 text-white rounded-xl font-semibold shadow-lg shadow-indigo-600/20 active:scale-95 transition-all flex items-center justify-center gap-2">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> Tiến hành Obfuscate
                    </button>
                </div>
            </div>

            <div class="flex flex-col h-[550px] bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden shadow-lg">
                <div class="bg-slate-950/80 px-4 py-3 border-b border-slate-800 flex justify-between items-center">
                    <span class="text-xs font-bold uppercase tracking-wider text-cyan-400"><i class="fa-solid fa-user-lock mr-1.5"></i> Code đã được bảo vệ</span>
                    <div class="flex gap-2" id="actionGroup" style="display: none;">
                        <button onclick="copyToClipboard()" class="text-xs bg-slate-800 hover:bg-slate-700 text-slate-200 px-3 py-1.5 rounded-lg transition-colors flex items-center gap-1">
                            <i class="fa-regular fa-copy"></i> <span id="copyText">Sao chép</span>
                        </button>
                        <button onclick="downloadCode()" class="text-xs bg-cyan-600/20 hover:bg-cyan-600 text-cyan-400 hover:text-white px-3 py-1.5 rounded-lg transition-all flex items-center gap-1">
                            <i class="fa-solid fa-download"></i> Tải về (.js)
                        </button>
                    </div>
                </div>
                <div id="loadingOverlay" class="hidden flex-1 flex-col items-center justify-center bg-slate-900 text-slate-400 gap-3">
                    <div class="w-10 h-10 border-4 border-indigo-500/30 border-t-indigo-500 rounded-full animate-spin"></div>
                    <p class="text-sm font-mono text-indigo-400">AI đang mã hóa cấu trúc mã...</p>
                </div>
                <textarea id="outputCode" readonly placeholder="Kết quả mã hóa bảo mật sẽ hiển thị tại đây..." class="w-full flex-1 p-5 bg-slate-950 text-slate-300 font-mono text-sm border-0 focus:ring-0 resize-none outline-none" spellcheck="false"></textarea>
            </div>

        </div>
    </main>

    <div id="toast" class="fixed bottom-5 right-5 bg-emerald-600 text-white px-4 py-3 rounded-xl shadow-xl flex items-center gap-2 transform translate-y-20 opacity-0 transition-all duration-300 z-50 text-sm font-medium">
        <i class="fa-solid fa-circle-check"></i>
        <span id="toastMsg">Thành công!</span>
    </div>

    <script>
        let selectedLevel = 'low';

        // Xử lý nút chọn cấp độ mã hóa
        document.querySelectorAll('.level-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('bg-indigo-600', 'text-white', 'shadow'));
                document.querySelectorAll('.level-btn').forEach(b => b.classList.add('text-slate-400'));
                this.classList.add('bg-indigo-600', 'text-white', 'shadow');
                this.classList.remove('text-slate-400');
                selectedLevel = this.getAttribute('data-level');
            });
        });

        // Đọc File được tải lên dán vào textarea gốc
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('fileName').innerText = file.name;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('inputCode').value = e.target.result;
                showToast("Đã tải file lên thành công!");
            };
            reader.readAsText(file);
        });

        // Xóa sạch dữ liệu đầu vào
        function clearInput() {
            document.getElementById('inputCode').value = '';
            document.getElementById('outputCode').value = '';
            document.getElementById('fileInput').value = '';
            document.getElementById('fileName').innerText = "Chọn file từ máy tính của bạn";
            document.getElementById('actionGroup').style.display = 'none';
        }

        // Hàm Obfuscate cốt lõi (Mô phỏng thuật toán AI hóa bảo mật cấu trúc)
        function processObfuscate() {
            const code = document.getElementById('inputCode').value.trim();
            if (!code) {
                alert("Vui lòng nhập hoặc tải code lên trước!");
                return;
            }

            // Hiện trạng thái Loading mượt mà không làm lệch UI
            document.getElementById('outputCode').classList.add('hidden');
            document.getElementById('loadingOverlay').classList.remove('hidden');
            document.getElementById('actionGroup').style.display = 'none';

            setTimeout(() => {
                let result = "";
                
                if (selectedLevel === 'low') {
                    // Cấp độ Thấp: Mã hóa chuỗi ký tự sang mã Hex dạng mảng
                    const hexArray = Array.from(code).map(c => '\\x' + c.charCodeAt(0).toString(16).padStart(2, '0')).join('');
                    result = `/* Obfuscated by AI Engine (Low Mode) */\neval("${hexArray}");`;
                } 
                else if (selectedLevel === 'medium') {
                    // Cấp độ Vừa: Đưa toàn bộ code vào cơ chế giải nén Base64 runtime
                    const b64 = btoa(unescape(encodeURIComponent(code)));
                    result = `/* Obfuscated by AI Engine (Medium Mode) */\nvar _0xai = ["${b64}"];\neval(decodeURIComponent(escape(atob(_0xai[0]))));`;
                } 
                else {
                    // Siêu cấp AI: Phức tạp hóa cấu trúc mảng lồng nhau biến đổi hàm tự gọi (IIFE)
                    const b64 = btoa(unescape(encodeURIComponent(code)));
                    result = `/* Protected by Super AI Anti-Tamper Engine */\n(function(_0x1, _0x2) { var _0x3 = function(_0x4) { while (--_0x4) { _0x1['push'](_0x1['shift']()); } }; _0x3(++_0x2); }(var _0xarr = ["${b64}"], 0x1));\nvar _0xdec = function(_0xidx) { return decodeURIComponent(escape(atob(_0xarr[0]))); };\neval(_0xdec());`;
                }

                document.getElementById('outputCode').value = result;
                document.getElementById('loadingOverlay').classList.add('hidden');
                document.getElementById('outputCode').classList.remove('hidden');
                document.getElementById('actionGroup').style.display = 'flex';
                showToast("Mã hóa thành công!");
            }, 1000); // Tạo độ trễ ảo cho AI load mượt
        }

        // Sao chép code đầu ra vào Clip Board máy tính
        function copyToClipboard() {
            const output = document.getElementById('outputCode');
            output.select();
            document.execCommand('copy');
            
            const copyText = document.getElementById('copyText');
            copyText.innerText = "Đã sao chép!";
            showToast("Đã sao chép mã nguồn!");
            setTimeout(() => {
                copyText.innerText = "Sao chép";
            }, 2000);
        }

        // Tải code đã obfuscate về máy dưới dạng file
        function downloadCode() {
            const text = document.getElementById('outputCode').value;
            const blob = new Blob([text], { type: 'text/plain' });
            const anchor = document.createElement('a');
            anchor.download = 'obfuscated_code.js';
            anchor.href = window.URL.createObjectURL(blob);
            anchor.target = '_blank';
            anchor.style.display = 'none';
            document.body.appendChild(anchor);
            anchor.click();
            document.body.removeChild(anchor);
            showToast("Tải file xuống hoàn tất!");
        }

        // Hiện Toast thông báo góc màn hình
        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }
    </script>
</body>
</html>
