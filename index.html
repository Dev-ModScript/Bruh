<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaiZon Obfuscator</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --background: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            color: #6366f1;
            margin-bottom: 10px;
        }

        header p {
            color: var(--text-muted);
        }

        .main-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .upload-zone {
            border: 2px dashed var(--border);
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-zone:hover {
            border-color: var(--primary);
            background: rgba(79, 70, 229, 0.05);
        }

        .upload-zone input {
            display: none;
        }

        .editor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .editor-container {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            display: flex;
            flex-direction: column;
        }

        .panel label {
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-muted);
        }

        textarea {
            width: 100%;
            height: 380px;
            background: #0b0f19;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: #10b981;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            resize: none;
            outline: none;
        }

        textarea:focus {
            border-color: var(--primary);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            width: 100%;
            font-size: 16px;
            margin-bottom: 15px;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: #334155;
            color: white;
            flex: 1;
        }

        .btn-secondary:hover {
            background: #475569;
        }

        .status {
            color: #10b981;
            text-align: center;
            font-size: 14px;
            margin-top: 10px;
            height: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>KaiZon Obfuscator</h1>
        <p>Hệ thống mã hóa mã nguồn bảo mật cao dành cho Lua</p>
    </header>

    <div class="main-box">
        <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
            <p>📁 Kéo thả file Lua/Txt vào đây hoặc <strong>Bấm để tải file lên</strong></p>
            <input type="file" id="fileInput" onchange="handleFileSelect(event)">
        </div>

        <div class="editor-container">
            <div class="panel">
                <label for="inputCode">Source Code (Gốc):</label>
                <textarea id="inputCode" placeholder="Dán đoạn code Lua của bạn vào đây..."></textarea>
            </div>
            
            <div class="panel">
                <label for="outputCode">Obfuscated Code (Đã mã hóa):</label>
                <textarea id="outputCode" placeholder="Kết quả mã hóa dạng (function() ... end)(...) sẽ hiển thị ở đây..." readonly></textarea>
                
                <div class="btn-group">
                    <button class="btn-secondary" onclick="copyResult()">Sao chép</button>
                    <button class="btn-secondary" onclick="downloadResult()">Tải về (.txt)</button>
                </div>
            </div>
        </div>

        <button class="btn-primary" onclick="runLuaObfuscate()">MÃ HÓA NGAY</button>
        <div class="status" id="statusMessage"></div>
    </div>
</div>

<script>
    function handleFileSelect(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('inputCode').value = e.target.result;
            showStatus("Đã tải file thành công!", "#10b981");
        };
        reader.readAsText(file);
    }

    // Thuật toán obfuscate sinh chuỗi Bytecode ảo hóa độc quyền cho Lua
    function runLuaObfuscate() {
        const source = document.getElementById('inputCode').value.trim();
        if (!source) {
            showStatus("Vui lòng nhập hoặc tải code lên trước!", "#ef4444");
            return;
        }

        try {
            // Tạo chuỗi Hex ngẫu nhiên (chữ và số đan xen) làm khóa muối giả lập để gây rối mắt
            const randUUID = Math.floor(Math.random() * 9000 + 1000) + "-" + Math.random().toString(36).substring(2, 6) + "-" + Math.floor(Math.random() * 9000 + 1000);
            
            // Tiến hành chuyển đổi từng ký tự của code thành mã Byte (Số) và nối chuỗi bằng toán tử Lua
            let byteCodeContainer = [];
            for (let i = 0; i < source.length; i++) {
                byteCodeContainer.push(source.charCodeAt(i));
            }

            // Chia nhỏ mảng số để nén vào định dạng chuỗi đặc biệt trong Lua [==[...]==]
            let encodedString = "";
            byteCodeContainer.forEach((byte, index) => {
                // Tạo ký tự làm rối (kết hợp cả ký tự chữ và số Hex động)
                if (index % 3 === 0) {
                    encodedString += "\\" + byte;
                } else if (index % 3 === 1) {
                    encodedString += "\\x" + byte.toString(16).toUpperCase();
                } else {
                    encodedString += "\\" + String(byte);
                }
            });

            // Tiêu đề bảo mật giống mẫu của bạn
            const creditHeader = `--[[\n This file was Protected by KaiZon Obfuscator.\n Version: 1.0\n UUID: ${randUUID}\n]]--\n`;

            // Khởi tạo cấu trúc giải mã chạy động bằng hàm load() của Lua
            // Đảm bảo phần đuôi kết thúc đúng cấu trúc tự kích hoạt: end, function(C,...) return C(...) end)
            const luaWrapper = `return(function(...)local _KaiZon = "${encodedString}";return load(_KaiZon, "KaiZon")(...) \nend,function(C,...)return C(...)end)(...)`;

            // Kết hợp tiêu đề và thân code hoàn chỉnh
            document.getElementById('outputCode').value = creditHeader + luaWrapper;
            showStatus("Mã hóa thành công 100%!", "#10b981");

        } catch (error) {
            showStatus("Có lỗi xảy ra khi xử lý thuật toán mã hóa!", "#ef4444");
        }
    }

    function copyResult() {
        const output = document.getElementById('outputCode');
        if (!output.value) {
            showStatus("Không có dữ liệu để sao chép!", "#ef4444");
            return;
        }
        output.select();
        document.execCommand('copy');
        showStatus("Đã sao chép vào bộ nhớ tạm!", "#10b981");
    }

    function downloadResult() {
        const output = document.getElementById('outputCode').value;
        if (!output) {
            showStatus("Không có dữ liệu để tải về!", "#ef4444");
            return;
        }
        const blob = new Blob([output], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'kaizon_protected.txt';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showStatus("Đã tải file thành công!", "#10b981");
    }

    function showStatus(msg, color) {
        const statusBox = document.getElementById('statusMessage');
        statusBox.innerText = msg;
        statusBox.style.color = color;
        setTimeout(() => { statusBox.innerText = ""; }, 4000);
    }
</script>

</body>
</html>
