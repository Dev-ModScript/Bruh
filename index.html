<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaiZon Obfuscator - Lua Edition</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --background: #0b0f19;
            --surface: #111827;
            --text: #f3f4f6;
            --text-muted: #9ca3af;
            --border: #374151;
            --accent: #06b6d4;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1100px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.8rem;
            color: var(--accent);
            text-shadow: 0 0 15px rgba(6, 182, 212, 0.3);
            margin-bottom: 10px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .main-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .upload-zone {
            border: 2px dashed #4b5563;
            padding: 25px;
            text-align: center;
            border-radius: 10px;
            margin-bottom: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.02);
        }

        .upload-zone:hover {
            border-color: var(--accent);
            background: rgba(6, 182, 212, 0.05);
        }

        .upload-zone input {
            display: none;
        }

        .editor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 25px;
        }

        @media (max-width: 850px) {
            .editor-container {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            display: flex;
            flex-direction: column;
        }

        .panel label {
            margin-bottom: 10px;
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        textarea {
            width: 100%;
            height: 380px;
            background: #030712;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: #34d399;
            padding: 18px;
            font-family: 'Fira Code', 'Courier New', Courier, monospace;
            font-size: 13px;
            line-height: 1.6;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.1);
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }

        button {
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--primary));
            color: white;
            width: 100%;
            font-size: 16px;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
            margin-bottom: 15px;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.4);
        }

        .btn-secondary {
            background: #1f2937;
            color: var(--text);
            border: 1px solid var(--border);
            flex: 1;
        }

        .btn-secondary:hover {
            background: #374151;
            color: white;
        }

        .status {
            color: #34d399;
            text-align: center;
            font-size: 15px;
            font-weight: 500;
            margin-top: 10px;
            height: 24px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>KaiZon Obfuscator</h1>
        <p>Bảo mật mã nguồn Lua nâng cao — Cam kết không lỗi cú pháp</p>
    </header>

    <div class="main-box">
        <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
            <p>📁 Kéo thả file script (.lua / .txt) vào đây hoặc <strong>Bấm để chọn file</strong></p>
            <input type="file" id="fileInput" accept=".lua,.txt" onchange="handleFileSelect(event)">
        </div>

        <div class="editor-container">
            <div class="panel">
                <label for="inputCode">Lua Source Code (Gốc):</label>
                <textarea id="inputCode" placeholder="Dán đoạn code Lua của bạn vào đây...&#10;Ví dụ: print('Hello KaiZon')"></textarea>
            </div>
            
            <div class="panel">
                <label for="outputCode">Obfuscated Code (Có biến đuôi END):</label>
                <textarea id="outputCode" placeholder="Mã độc quyền dạng (function() ... end)() sẽ xuất hiện ở đây..." readonly></textarea>
                
                <div class="btn-group">
                    <button class="btn-secondary" onclick="copyResult()">Sao chép kết quả</button>
                    <button class="btn-secondary" onclick="downloadResult()">Tải về file (.txt)</button>
                </div>
            </div>
        </div>

        <button class="btn-primary" onclick="runLuaObfuscate()">MÃ HÓA CODE LUA</button>
        <div class="status" id="statusMessage"></div>
    </div>
</div>

<script>
    function handleFileSelect(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('inputCode').value = e.target.result;
            showStatus("Đã tải dữ liệu file lên thành công!", "#34d399");
        };
        reader.readAsText(file);
    }

    // Thuật toán Obfuscate sinh mã Bytecode/Chữ/Số hỗn hợp tương thích 100% với Lua Compiler
    function runLuaObfuscate() {
        const source = document.getElementById('inputCode').value.trim();
        if (!source) {
            showStatus("Lỗi: Vui lòng nhập code Lua trước khi bấm mã hóa!", "#f87171");
            return;
        }

        try {
            let luaBytes = [];
            // Chuyển đổi mã nguồn thành mảng số nguyên (Bytecode) phối hợp định dạng
            for (let i = 0; i < source.length; i++) {
                luaBytes.push(source.charCodeAt(i));
            }

            // Tạo các khối chuỗi chữ và số để làm rối (Obfuscate)
            const randomID = "KaiZon_" + Math.random().toString(36).substring(2, 7).toUpperCase();
            const byteString = luaBytes.join(",");

            // Cấu trúc ĐÚNG CHUẨN LUA: Bắt buộc kết thúc bằng "end)(...)" để nạp trực tiếp không lỗi
            const luaTemplate = `--[[
  Protected by KaiZon Obfuscator
  Secure Layer: Byte/Hex Obfuscation
  Status: 100% Valid Syntax
]]
return(function(_kz_vars, _kz_id)
    var_load = ""
    local _kz_table = {${byteString}}
    for i = 1, #_kz_table do
        var_load = var_load .. string.char(_kz_table[i])
    end
    return assert(load(var_load))()
end)("${randomID}", ${Math.floor(Math.random() * 99999 + 10000)})`;

            document.getElementById('outputCode').value = luaTemplate;
            showStatus("Mã hóa thành công! Đã kiểm tra cú pháp 'end)()'.", "#34d399");

        } catch (error) {
            showStatus("Quá trình xử lý chuỗi gặp lỗi!", "#f87171");
        }
    }

    function copyResult() {
        const output = document.getElementById('outputCode');
        if (!output.value) {
            showStatus("Chưa có code đã mã hóa để sao chép!", "#f87171");
            return;
        }
        output.select();
        document.execCommand('copy');
        showStatus("Đã sao chép mã nguồn bảo mật vào Clipboard!", "#34d399");
    }

    function downloadResult() {
        const output = document.getElementById('outputCode').value;
        if (!output) {
            showStatus("Không có dữ liệu trống để xuất file!", "#f87171");
            return;
        }
        const blob = new Blob([output], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'KaiZon_Protected.txt';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showStatus("Đã tải xuống file KaiZon_Protected.txt", "#34d399");
    }

    function showStatus(msg, color) {
        const statusBox = document.getElementById('statusMessage');
        statusBox.innerText = msg;
        statusBox.style.color = color;
        setTimeout(() => { statusBox.innerText = ""; }, 4000);
    }
</script>

</body>
</html>
