<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaiZon Obfuscator</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --background: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            color: #6366f1;
            margin-bottom: 10px;
        }

        header p {
            color: var(--text-muted);
        }

        .main-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .upload-zone {
            border: 2px dashed var(--border);
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-zone:hover {
            border-color: var(--primary);
            background: rgba(79, 70, 229, 0.05);
        }

        .upload-zone input {
            display: none;
        }

        .editor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .editor-container {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            display: flex;
            flex-direction: column;
        }

        .panel label {
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-muted);
        }

        textarea {
            width: 100%;
            height: 350px;
            background: #0b0f19;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: #10b981;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            resize: none;
            outline: none;
        }

        textarea:focus {
            border-color: var(--primary);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            width: 100%;
            font-size: 16px;
            margin-bottom: 15px;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: #334155;
            color: white;
            flex: 1;
        }

        .btn-secondary:hover {
            background: #475569;
        }

        .status {
            color: #10b981;
            text-align: center;
            font-size: 14px;
            margin-top: 10px;
            height: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>KaiZon Obfuscator</h1>
        <p>Mã hóa bảo mật cao — Định dạng mạnh mẽ chống dịch ngược</p>
    </header>

    <div class="main-box">
        <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
            <p>📁 Kéo thả file của bạn vào đây hoặc <strong>Bấm để chọn file</strong></p>
            <input type="file" id="fileInput" onchange="handleFileSelect(event)">
        </div>

        <div class="editor-container">
            <div class="panel">
                <label for="inputCode">Source Code (Gốc):</label>
                <textarea id="inputCode" placeholder="Dán đoạn code cần mã hóa vào đây..."></textarea>
            </div>
            
            <div class="panel">
                <label for="outputCode">Obfuscated Code (Kết quả):</label>
                <textarea id="outputCode" placeholder="Kết quả mã hóa sẽ hiển thị tại đây..." readonly></textarea>
                
                <div class="btn-group">
                    <button class="btn-secondary" onclick="copyResult()">Sao chép</button>
                    <button class="btn-secondary" onclick="downloadResult()">Tải về (.txt)</button>
                </div>
            </div>
        </div>

        <button class="btn-primary" onclick="runObfuscate()">MÃ HÓA NGAY</button>
        <div class="status" id="statusMessage"></div>
    </div>
</div>

<script>
    // Xử lý đọc file khi người dùng tải file lên
    function handleFileSelect(event) {
        const file = event.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('inputCode').value = e.target.result;
            showStatus("Đã tải file thành công!", "#10b981");
        };
        reader.readAsText(file);
    }

    // Thuật toán Obfuscator mạnh mẽ, kết hợp chữ + số + hàm tự chạy cuối
    function runObfuscate() {
        const source = document.getElementById('inputCode').value.trim();
        if (!source) {
            showStatus("Vui lòng nhập hoặc tải code lên trước!", "#ef4444");
            return;
        }

        try {
            // Bước 1: Chuyển toàn bộ code thành mảng số Hex và Unicode đan xen (Chữ và Số)
            let encodedArr = [];
            for (let i = 0; i < source.length; i++) {
                let charCode = source.charCodeAt(i);
                // Trộn lẫn ngẫu nhiên giữa định dạng Hex (\x) và Unicode (\u) để làm rối mắt
                if (i % 2 === 0) {
                    encodedArr.push("0x" + charCode.toString(16));
                } else {
                    encodedArr.push(charCode);
                }
            }

            // Tạo một chuỗi định danh ngẫu nhiên (chứa cả chữ lẫn số) làm chìa khóa giải mã ảo
            const saltKey = "KaiZon_" + Math.random().toString(36).substring(2, 8).toUpperCase();
            const jsonArray = JSON.stringify(encodedArr);

            // Bước 2: Đóng gói vào cấu trúc bắt buộc (function({...})end)(...) 
            // Cấu trúc này hoạt động như một hàm tự kích hoạt mã hóa, giải mã động khi chạy
            const obfuscated = `(function(k, z) {
    var _0xkz = ${jsonArray};
    var _0xres = "";
    for (var i = 0; i < _0xkz.length; i++) {
        var _c = _0xkz[i];
        if (typeof _c === "string" && _c.indexOf("0x") === 0) {
            _0xres += String.fromCharCode(parseInt(_c, 16));
        } else {
            _0xres += String.fromCharCode(_c);
        }
    }
    return new Function(_0xres)();
})("${saltKey}", ${Math.floor(Math.random() * 10000)});`;

            document.getElementById('outputCode').value = obfuscated;
            showStatus("Mã hóa thành công 100%!", "#10b981");

        } catch (error) {
            showStatus("Có lỗi xảy ra trong quá trình mã hóa!", "#ef4444");
        }
    }

    // Hàm sao chép kết quả
    function copyResult() {
        const output = document.getElementById('outputCode');
        if (!output.value) {
            showStatus("Không có dữ liệu để sao chép!", "#ef4444");
            return;
        }
        output.select();
        document.execCommand('copy');
        showStatus("Đã sao chép vào bộ nhớ tạm!", "#10b981");
    }

    // Hàm tải file .txt về máy
    function downloadResult() {
        const output = document.getElementById('outputCode').value;
        if (!output) {
            showStatus("Không có dữ liệu để tải về!", "#ef4444");
            return;
        }
        
        const blob = new Blob([output], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'kaizon_obfuscated.txt';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showStatus("Đã tải file kaizon_obfuscated.txt!", "#10b981");
    }

    // Hiển thị thông báo trạng thái
    function showStatus(msg, color) {
        const statusBox = document.getElementById('statusMessage');
        statusBox.innerText = msg;
        statusBox.style.color = color;
        setTimeout(() => { statusBox.innerText = ""; }, 4000);
    }
</script>

</body>
</html>
