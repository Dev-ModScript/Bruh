<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Lua Obfuscator Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Tối ưu hóa thanh cuộn cho các vùng chứa code */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #1e1e2e; }
        ::-webkit-scrollbar-thumb { background: #44475a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6272a4; }
    </style>
</head>
<body class="bg-[#0f0f1a] text-gray-200 font-sans min-h-screen flex flex-col justify-between">

    <header class="border-b border-gray-800 bg-[#161626]/80 backdrop-blur px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 p-2 rounded-lg text-white font-bold text-xl shadow-lg shadow-indigo-600/30">AI</div>
            <h1 class="text-xl font-bold tracking-wide text-white">Lua <span class="text-indigo-400">Obfuscator</span></h1>
        </div>
        <span class="text-xs bg-indigo-950 text-indigo-400 px-3 py-1 rounded-full border border-indigo-800/50 font-medium">Anti-Decompile v2.4</span>
    </header>

    <main class="flex-1 max-w-7xl w-full mx-auto p-4 md:p-6 grid grid-cols-1 md:grid-cols-2 gap-6 items-stretch">
        
        <div class="bg-[#161626] border border-gray-800 rounded-2xl p-5 flex flex-col shadow-xl">
            <div class="flex justify-between items-center mb-3">
                <label class="text-sm font-semibold text-gray-400 flex items-center gap-2">
                    <svg class="w-4 h-4 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                    Source Code (Lua)
                </label>
                <label class="cursor-pointer bg-gray-800 hover:bg-gray-700 text-xs text-gray-300 font-medium py-1.5 px-3 rounded-lg transition border border-gray-700 flex items-center gap-1">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    Chọn file .lua / .txt
                    <input type="file" id="fileInput" accept=".lua,.txt" class="hidden">
                </label>
            </div>
            
            <textarea id="inputCode" placeholder="Dán mã nguồn Lua của bạn vào đây..." class="w-full flex-1 min-h-[350px] bg-[#0f0f1a] border border-gray-800 rounded-xl p-4 font-mono text-sm text-indigo-300 focus:outline-none focus:border-indigo-500 transition resize-none"></textarea>
            
            <button id="obfuscateBtn" class="mt-4 w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 px-4 rounded-xl transition shadow-lg shadow-indigo-600/20 active:scale-[0.99] flex justify-center items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                Tiến Hành Obfuscate
            </button>
        </div>

        <div class="bg-[#161626] border border-gray-800 rounded-2xl p-5 flex flex-col shadow-xl">
            <div class="flex justify-between items-center mb-3">
                <span class="text-sm font-semibold text-gray-400 flex items-center gap-2">
                    <svg class="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                    Output Obfuscated Code
                </span>
                
                <div class="flex gap-2">
                    <button id="copyBtn" class="bg-gray-800 hover:bg-gray-700 text-xs text-gray-300 font-medium py-1.5 px-3 rounded-lg transition border border-gray-700 flex items-center gap-1 disabled:opacity-50" disabled>
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                        Copy
                    </button>
                    <button id="downloadBtn" class="bg-emerald-600/20 hover:bg-emerald-600 border border-emerald-500/30 text-emerald-400 hover:text-white text-xs font-medium py-1.5 px-3 rounded-lg transition flex items-center gap-1 disabled:opacity-50" disabled>
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        Tải .txt
                    </button>
                </div>
            </div>

            <textarea id="outputCode" readonly placeholder="Mã nguồn sau khi obfuscate sẽ xuất hiện ở đây..." class="w-full flex-1 min-h-[350px] bg-[#0f0f1a] border border-gray-800 rounded-xl p-4 font-mono text-sm text-emerald-400 focus:outline-none focus:border-emerald-500 transition resize-none"></textarea>
        </div>

    </main>

    <footer class="border-t border-gray-900 bg-[#0b0b13] text-center py-4 text-xs text-gray-500">
        &copy; 2026 AI Obfuscator Engine. Hoạt động mượt mà, không lỗi layout.
    </footer>

    <script>
        const inputCode = document.getElementById('inputCode');
        const outputCode = document.getElementById('outputCode');
        const fileInput = document.getElementById('fileInput');
        const obfuscateBtn = document.getElementById('obfuscateBtn');
        const copyBtn = document.getElementById('copyBtn');
        const downloadBtn = document.getElementById('downloadBtn');

        // 1. Xử lý đọc file khi Upload
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                inputCode.value = e.target.result;
            };
            reader.readAsText(file);
        });

        // 2. Thuật toán Obfuscation chạy được + Đuôi theo yêu cầu
        function obfuscateLua(source) {
            if (!source.trim()) return "";
            
            // Chuyển đổi toàn bộ code sang dạng mảng mã Bytecode số nguyên
            let bytes = [];
            for (let i = 0; i < source.length; i++) {
                bytes.push(source.charCodeAt(i));
            }
            
            const byteString = bytes.join(',');

            // Tạo đoạn wrapper giải mã có thể chạy trực tiếp bằng load() hoặc loadstring()
            // Đảm bảo kết thúc chính xác bằng chuỗi: getmetatable,select,{...})end)(...)
            let obfuscated = `-- Obfuscated by AI Engine\n`;
            obfuscated += `(function(...) local _ = {${byteString}}; local s = ""; for i=1, #_ do s = s .. string.char(_[i]) end; return assert(loadstring or load)(s)(getmetatable,select,{...})end)(...)`;
            
            return obfuscated;
        }

        // 3. Sự kiện Click nút Obfuscate
        obfuscateBtn.addEventListener('click', () => {
            const code = inputCode.value;
            if(!code.trim()) {
                alert("Vui lòng nhập hoặc upload code trước!");
                return;
            }
            
            const result = obfuscateLua(code);
            outputCode.value = result;

            // Kích hoạt các nút tương tác
            copyBtn.disabled = false;
            downloadBtn.disabled = false;
        });

        // 4. Xử lý Sao chép (Copy)
        copyBtn.addEventListener('click', () => {
            if(!outputCode.value) return;
            navigator.clipboard.writeText(outputCode.value).then(() => {
                const originalText = copyBtn.innerHTML;
                copyBtn.innerHTML = `✓ Đã Copy`;
                copyBtn.classList.add('bg-indigo-600', 'text-white');
                setTimeout(() => {
                    copyBtn.innerHTML = originalText;
                    copyBtn.classList.remove('bg-indigo-600', 'text-white');
                }, 2000);
            });
        });

        // 5. Xử lý Tải file (.txt)
        downloadBtn.addEventListener('click', () => {
            if(!outputCode.value) return;
            const blob = new Blob([outputCode.value], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'obfuscated_code.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });
    </script>
</body>
</html>
